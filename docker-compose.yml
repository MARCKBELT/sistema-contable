version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: contable-postgres
    environment:
      POSTGRES_DB: contable_db
      POSTGRES_USER: contable_user
      POSTGRES_PASSWORD: contable_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contable_user -d contable_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contable-network

  # Redis para cache y sesiones
  redis:
    image: redis:7-alpine
    container_name: contable-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contable-network

  # API Gateway
  api-gateway:
    build: ./backend/api-gateway
    container_name: contable-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      CONTABILIDAD_SERVICE_URL: http://contabilidad-service:3002
      NOMINAS_SERVICE_URL: http://nominas-service:3003
      FACTURACION_SERVICE_URL: http://facturacion-service:3004
    depends_on:
      - auth-service
      - contabilidad-service
      - nominas-service
      - facturacion-service
    networks:
      - contable-network
    restart: unless-stopped

  # Servicio de Autenticación
  auth-service:
    build: ./backend/auth-service
    container_name: contable-auth
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: contable_db
      DB_USER: contable_user
      DB_PASSWORD: contable_pass_2026
      JWT_SECRET: contable_jwt_secret_2026_multiempresa_bolivia
      JWT_EXPIRES_IN: 24h
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - contable-network
    restart: unless-stopped

  # Servicio de Contabilidad
  contabilidad-service:
    build: ./backend/contabilidad-service
    container_name: contable-contabilidad
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: contable_db
      DB_USER: contable_user
      DB_PASSWORD: contable_pass_2026
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contable-network
    restart: unless-stopped

  # Servicio de Nóminas
  nominas-service:
    build: ./backend/nominas-service
    container_name: contable-nominas
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: contable_db
      DB_USER: contable_user
      DB_PASSWORD: contable_pass_2026
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contable-network
    restart: unless-stopped

  # Servicio de Facturación
  facturacion-service:
    build: ./backend/facturacion-service
    container_name: contable-facturacion
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: contable_db
      DB_USER: contable_user
      DB_PASSWORD: contable_pass_2026
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contable-network
    restart: unless-stopped

  # Frontend Angular (comentado temporalmente)
  frontend:
    build: ./frontend
    container_name: contable-frontend
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.angular
    networks:
      - contable-network
    restart: unless-stopped

networks:
  contable-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
