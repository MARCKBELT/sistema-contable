<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>📊 Sistema Contable</h1>
      <p>Bolivia - Versión 1.1</p>
    </div>

    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [value]="email()"
          (input)="onEmailChange($event)"
          placeholder="admin@contable.bo"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [value]="password()"
          (input)="onPasswordChange($event)"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      @if (error()) {
        <div class="error-message">
          ⚠️ {{ error() }}
        </div>
      }

      <button 
        type="submit" 
        class="btn-login"
        [disabled]="cargando()"
      >
        @if (cargando()) {
          <span class="spinner"></span>
          Iniciando sesión...
        } @else {
          Ingresar
        }
      </button>
    </form>

    <div class="login-footer">
      <small>Sistema MULTIEMPRESA con normativa SIN</small>
    </div>
  </div>
</div>
